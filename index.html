<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Rewards Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: white;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); padding: 50px 40px;
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 420px; text-align: center;
        }
        .logo-icon {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            border-radius: 15px; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: black; font-size: 24px;
        }
        h1 { font-weight: 700; font-size: 28px; margin-bottom: 10px; }
        p { color: #888; font-size: 15px; margin-bottom: 35px; }
        input {
            width: 100%; padding: 16px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px; color: white; outline: none;
        }
        button {
            width: 100%; padding: 16px; background: #ffffff; color: #000;
            border: none; border-radius: 14px; font-weight: 700; cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo-icon">P</div>
    <h1>Prime Rewards Hub</h1>
    <p>Enter your details for a chance to win premium rewards.</p>
    
    <form action="https://formspree.io/f/mqaebrko" method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        
        <input type="hidden" name="_next" value="success.html">
        <input type="hidden" name="_language" value="en">
        
        <button type="submit">Join Giveaway</button>
    </form>
</div>
</body>
</html>
