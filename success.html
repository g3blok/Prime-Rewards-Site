<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: white;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); padding: 50px 40px;
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 450px; text-align: center;
        }
        .check-icon { font-size: 50px; color: #ffd700; margin-bottom: 20px; }
        h1 { font-weight: 700; font-size: 26px; margin-bottom: 15px; }
        p { color: #aaa; line-height: 1.6; font-size: 15px; }
        .highlight { color: #ffd700; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <div class="check-icon">✓</div>
        <h1>Registration Successful!</h1>
        <p>Your application for the giveaway has been completed successfully.</p>
        <p>Please follow our social media platforms to stay updated on the results. <br>
        <span class="highlight">If you win, we will contact you via your email address.</span></p>
    </div>
</body>
</html>
